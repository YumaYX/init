---
- hosts: all
  gather_facts: false
  tasks:
    - name: Check if the system is virtualized
      ansible.builtin.command: bash -lc "systemd-detect-virt"
      register: virt_check
      ignore_errors: true

- hosts: all
  vars:
    prime_user: yuma
    ruby_version: 3.3.5
  roles:
    - init
    - user
    - ruby
    - httpd
    - nfs
    - workspace
    - role: kvm-vagrant
      when: virt_check.stdout == "none"
      ignore_errors: true
    - serverspec

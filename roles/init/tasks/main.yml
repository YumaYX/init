---
# tasks file for roles/init
- name: Dnf update - cron
  ansible.builtin.cron:
    name: dnf-update-cron
    minute: "0"
    job: dnf -y update

- name: Install vim, make
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - vim
      - make

- name: Install @development
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - "@development"

- name: Install @Server with GUI
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - "@Server with GUI"

- name: Install tools
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - vim
      - make
      - "@development"
      - "@Server with GUI"


- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Start firewalld
  ansible.builtin.systemd_service:
    name: firewalld
    enabled: true
    state: started

- name: Set hostname
  ansible.builtin.hostname:
    name: y.localdomain

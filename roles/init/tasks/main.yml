---
# Tasks file for NFS role
- name: Ensure nfs-utils package is installed
  ansible.builtin.dnf:
    name: nfs-utils
    state: latest

- name: Add settings to /etc/exports
  blockinfile:
    path: /etc/exports
    marker: "# Ansible {mark}"
    create: yes
    block: |
      /nfs *(rw,all_squash,async)

- name: Create directory if it doesn't exist
  file:
    path: /nfs
    state: directory
    owner: nobody
    group: nobody
    mode: '0777'

- name: Run exportfs -av command
  command: exportfs -av

- name: Ensure rpcbind and nfs-server services are enabled and started
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - rpcbind
    - nfs-server

- name: Open NFS ports in Firewalld
  firewalld:
    service: "{{ item }}"
    state: enabled
    permanent: true
  loop:
    - nfs
    - rpc-bind
    - nfs3
    - mountd

- name: Reload Firewalld
  service:
    name: firewalld
    state: reloaded

- name: Force systemd to reread configs (version 2.4 and above)
  ansible.builtin.systemd_service:
    daemon_reload: true


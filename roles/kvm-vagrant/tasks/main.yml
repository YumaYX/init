---
# tasks file for roles/kvm-vagrant
- name: Install yum-utils
  ansible.builtin.dnf:
    name: yum-utils
    state: present

- name: Add hashicorp repo
  ansible.builtin.command: bash -lc "yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo"
- name: Install tools for kvm + vagrant
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - libvirt
      - libvirt-devel
      - qemu-kvm
      - vagrant
      - virt-install
      - virt-manager

- name: Start libvirtd
  ansible.builtin.systemd_service:
    name: libvirtd
    enabled: true
    state: started

- name: Add existing user to the group
  ansible.builtin.user:
    name: "{{ prime_user }}"
    groups: libvirt
    append: true
    state: present

- name: Install vagrant-libvirt plugin
  ansible.builtin.command: bash -lc "vagrant plugin install vagrant-libvirt"
  become: true
  become_user: "{{ prime_user }}"

- name: Vagrantfile
  ansible.builtin.template:
    src: templates/Vagrantfile
    dest: /tmp/Vagrantfile

- name: Run virtual machine
  ansible.builtin.command: bash -lc "vagrant up"
  args:
    chdir: /tmp
  become: true
  become_user: "{{ prime_user }}"

- name: Run virtual machine
  ansible.builtin.command: bash -lc "vagrant ssh -c "whoami""
  args:
    chdir: /tmp
  become: true
  become_user: "{{ prime_user }}"
  register: result

- name: Whoami - vagrant
  ansible.builtin.assert:
    that: result.stdout == "vagrant"

- name: Stop virtual machine
  ansible.builtin.command: bash -lc "vagrant destroy -f"
  args:
    chdir: /tmp
  become: true
  become_user: "{{ prime_user }}"

- name: Delete /tmp/.vagrant
  ansible.builtin.file:
    state: absent
    path: /tmp/.vagrant

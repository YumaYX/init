---
# tasks file for roles/ruby

# - name: Ensure the crb repository is enabled
#   community.general.dnf_config_manager:
#     name: crb
#     state: enabled
- name : enable crb
  shell: bash -lc "dnf config-manager --set-enabled crb"

- name: install some packages for ruby
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: latest
  vars:
    packages:
    - bzip2
    - gcc
    - openssl-devel
    - readline-devel
    - zlib-devel
    - libyaml-devel
    - git

- name: git clone
  ansible.builtin.git:
    repo: https://github.com/rbenv/rbenv.git
    dest: /home/{{ prime_user }}/.rbenv
  become: yes
  become_user: "{{ prime_user }}"

- name: git clone
  ansible.builtin.git:
    repo: https://github.com/rbenv/ruby-build.git
    dest: /home/{{ prime_user }}/.rbenv/plugins/ruby-build
  become: yes
  become_user: "{{ prime_user }}"

- name: Check Ruby Install
  shell: bash -lc "ruby -v"
  ignore_errors: yes
  become: yes
  become_user: "{{ prime_user }}"
  register: command_result

- name: Ruby Install
  shell: /bin/bash -lc "rbenv install {{ ruby_version }} && rbenv global {{ ruby_version }}"
  become: yes
  become_user: "{{ prime_user }}"
  when: "('ruby ' + ruby_version) not in command_result.stdout"

- name: Update Gems
  shell: bash -lc "gem update --system"
  become: yes
  become_user: "{{ prime_user }}"

- name: Update Gem
  shell: bash -lc "gem update"
  become: yes
  become_user: "{{ prime_user }}"

- name: Install gems
  gem:
    name: "{{ item }}"
    executable: "/home/{{ prime_user}}/.rbenv/shims/gem"
  with_items:
    - rake
    - minitest
    - serverspec
    - rubocop
  become: yes
  become_user: "{{ prime_user }}"
